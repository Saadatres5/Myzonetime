<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050916"/>
      <stop offset="100%" style="stop-color:#090f1f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="20%" r="40%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="30%" r="35%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Clock icon -->
  <circle cx="600" cy="200" r="60" fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.3"/>
  <circle cx="600" cy="200" r="48" fill="#0f1e33" stroke="#38bdf8" stroke-width="2.5"/>
  <line x1="600" y1="200" x2="600" y2="164" stroke="#38bdf8" stroke-width="3" stroke-linecap="round"/>
  <line x1="600" y1="200" x2="626" y2="210" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="600" cy="200" r="4" fill="#38bdf8"/>
  <!-- Title -->
  <text x="600" y="320" font-family="system-ui,-apple-system,sans-serif" font-size="72" font-weight="700" fill="#f0f6ff" text-anchor="middle" letter-spacing="-2">MyZoneTime</text>
  <!-- Tagline -->
  <text x="600" y="388" font-family="system-ui,-apple-system,sans-serif" font-size="28" font-weight="400" fill="#94a3c0" text-anchor="middle" letter-spacing="0.5">World Clock &amp; Time Zone Tools</text>
  <!-- Pills -->
  <rect x="250" y="430" width="180" height="40" rx="20" fill="#38bdf820" stroke="#38bdf840"/>
  <text x="340" y="456" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">500+ Cities</text>
  <rect x="460" y="430" width="180" height="40" rx="20" fill="#38bdf820" stroke="#38bdf840"/>
  <text x="550" y="456" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">Free Tools</text>
  <rect x="670" y="430" width="200" height="40" rx="20" fill="#38bdf820" stroke="#38bdf840"/>
  <text x="770" y="456" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#38bdf8" text-anchor="middle">DST-Aware</text>
  <!-- Domain -->
  <text x="600" y="570" font-family="system-ui,-apple-system,sans-serif" font-size="22" fill="#4a5a7a" text-anchor="middle">myzonetime.com</text>
</svg>
