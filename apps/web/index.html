<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Geo Meta Tags for International SEO -->
    <meta name="geo.region" content="AE" />
    <meta name="geo.placename" content="United Arab Emirates" />
    <meta name="language" content="en" />

    <!-- Icons and Manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Resource Hints for Critical Domains -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font load — Inter. Async via media swap. -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
    </noscript>

    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MyZoneTime" />
    <meta property="og:image" content="https://myzonetime.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://myzonetime.com/og-image.png" />

    <style>
      :root { --bg: #fafafa; --fg: #0a0a0a; --primary: 221 83% 53%; }
      @media (prefers-color-scheme: dark) { :root { --bg: #0a0a0a; --fg: #fafafa; --primary: 217 91% 60%; } }
      body, html {
        margin: 0; padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: var(--bg);
        color: var(--fg);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root { display: flex; flex-direction: column; flex: 1; width: 100%; contain: layout; }
      .contain-layout { contain: layout; }
      .transform-gpu { transform: translateZ(0); }
    </style>

    <!-- Google AdSense Account Verification -->
    <meta name="google-adsense-account" content="ca-pub-5444446255342320" />

    <!-- Google AdSense Script -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5444446255342320"
     crossorigin="anonymous"></script>

    <title>MyZoneTime - World Clock, Time Zone Converter &amp; Meeting Planner</title>
    <meta name="description" content="Check the current time in any city worldwide. Convert time zones, plan international meetings, and use our free world clock tools." />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
